<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width: 88px; height: 100vh; flex: none; background: #0e0e10; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 4px; border-right: 1px solid #1f1f23;">
  <div style="display: flex; flex-direction: column; align-items: center; gap: 5px; margin-bottom: 26px; padding: 0 6px;">
    <img src="assets/ivolve_logo_white.png" alt="Ivolve Studios" style="width: 44px; height: auto; display: block; opacity: 0.8;" />
    <span style="font-size: 21px; font-weight: 800; letter-spacing: -0.03em; color: #fff; line-height: 1;">Censio</span>
  </div>

  <button onClick="{{ goProjects }}" title="Projects" style="{{ projectsStyle }}">
    {{ icProjects }}
    <span style="font-size: 11px; font-weight: 700; letter-spacing: 0.01em;">Projects</span>
  </button>

  <sc-if value="{{ showUpload }}" hint-placeholder-val="{{ false }}">
    <button onClick="{{ goUpload }}" title="Upload" style="{{ uploadStyle }}">
      {{ icUpload }}
      <span style="font-size: 11px; font-weight: 700;">Upload</span>
    </button>
  </sc-if>
  <sc-if value="{{ showAdmin }}" hint-placeholder-val="{{ false }}">
    <button onClick="{{ goAdmin }}" title="Admin" style="{{ adminStyle }}">
      {{ icAdmin }}
      <span style="font-size: 11px; font-weight: 700;">Admin</span>
    </button>
  </sc-if>

  <div style="margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 9px;">
    <button onClick="{{ goAccount }}" title="Your account" style="display: flex; flex-direction: column; align-items: center; gap: 5px; background: transparent; border: none; cursor: pointer; padding: 4px;" style-hover="opacity: 0.85;">
      <div style="width: 44px; height: 44px; border-radius: 50%; background: #1f1f23; border: 1px solid #34343a; color: #f4f4f2; font-weight: 800; font-size: 15px; display: flex; align-items: center; justify-content: center;">{{ initials }}</div>
      <div style="font-size: 10px; color: #6e6e75; font-weight: 700; text-align: center; max-width: 76px; line-height: 1.25;">{{ role }}</div>
    </button>
    <button onClick="{{ goSignout }}" title="Sign out" style="display: flex; flex-direction: column; align-items: center; gap: 3px; background: transparent; border: none; color: #7a7a82; cursor: pointer; padding: 6px 4px; border-radius: 10px;" style-hover="color: #e2241c;">
      {{ icSignout }}
      <span style="font-size: 10px; font-weight: 700;">Sign out</span>
    </button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:88,&quot;height&quot;:900},&quot;active&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;projects&quot;},&quot;role&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Ivolve&quot;},&quot;nameAttr&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Sunny Chan&quot;},&quot;isTeam&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false},&quot;isAdmin&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true},&quot;onNav&quot;:{&quot;editor&quot;:null}}">
class Component extends DCLogic {
  renderVals(){
    const active = this.props.active;
    const nav = this.props.onNav || (()=>{});
    const name = this.props.nameAttr || 'David Chen';
    const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const btn = (on)=>({ width:'66px', height:'62px', border:'none', borderRadius:'14px', background: on?'#1f1f23':'transparent', color: on?'#f4f4f2':'#7a7a82', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'4px', cursor:'pointer', borderLeft: on?'2px solid #e2241c':'2px solid transparent' });
    const isTeam = !!this.props.isTeam || (this.props.role||'').toLowerCase().includes('team');
    const isAdmin = !!this.props.isAdmin;
    const E=React.createElement;
    const svg=(ch)=>E('svg',{viewBox:'0 0 24 24',width:21,height:21,fill:'none',stroke:'currentColor',strokeWidth:1.9,strokeLinecap:'round',strokeLinejoin:'round',style:{display:'block'}}, ch.map((c,i)=>E(c[0],{...c[1],key:i})));
    const P=(d)=>['path',{d}]; const C=(cx,cy,r)=>['circle',{cx,cy,r}];
    return {
      icProjects: svg([P('M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z')]),
      icUpload: svg([P('M12 15V4M8 8l4-4 4 4M5 20h14')]),
      icAdmin: svg([C(12,12,3.2), P('M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1')]),
      icSignout: svg([P('M15 4h3a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-3'), P('M10 17l-5-5 5-5'), P('M5 12h11')]),
      goProjects: ()=>nav('projects'), goUpload: ()=>nav('upload'), goAdmin: ()=>nav('admin'), goSignout: ()=>nav('signout'), goAccount: ()=>nav('account'),
      projectsStyle: btn(active==='projects'), uploadStyle: btn(active==='upload'), adminStyle: btn(active==='admin'),
      showUpload: isTeam, showAdmin: isAdmin, initials, role: this.props.role || 'Architect',
    };
  }
}
</script>
</body>
</html>
